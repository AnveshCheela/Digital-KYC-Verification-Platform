services:
  - type: web
    name: verifyflow-api
    env: node
    rootDir: server
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: verifyflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: verifyflow-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: worker
    name: verifyflow-worker
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: verifyflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: verifyflow-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: verifyflow-db
    databaseName: verifyflow
    user: verifyflow

  - type: redis
    name: verifyflow-redis
    ipAllowList: [] # Internal access only
