services:
  - type: web
    name: verifyflow-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run migrate
    startCommand: node src/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: verifyflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: verifyflow-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: redis
    name: verifyflow-redis
    plan: free
    ipAllowList: [] # Internal access only

databases:
  - name: verifyflow-db
    databaseName: verifyflow
    user: verifyflow
    plan: free
